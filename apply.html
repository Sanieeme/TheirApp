<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apply | Bono Foundation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #f5f5f5;
}

/* NAVBAR */
.navbar {
    background: #000;
    border-bottom: 2px solid #d4af37;
    padding: 1rem 2rem;
}

.navbar-brand {
    color: #d4af37 !important;
    font-weight: bold;
}

/* SECTION */
.section {
    padding: 4rem 1rem;
}

/* FORM CARD */
.form-container {
    background: #141414;
    padding: 2.5rem;
    border-radius: 15px;
    border: 1px solid rgba(212,175,55,0.4);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* TITLE */
.form-title {
    text-align: center;
    color: #d4af37;
    margin-bottom: 10px;
}

.form-subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 20px;
}

/* LABEL */
.form-label {
    font-weight: 600;
    margin-bottom: 5px;
    color: #ddd;
}

/* INPUTS */
.form-control,
.form-select,
textarea {
    background: #1e1e1e;
    border: 1px solid #333;
    color: #fff;
    border-radius: 8px;
    padding: 10px;
}

.form-control::placeholder,
textarea::placeholder {
    color: #888;
}

/* FOCUS */
.form-control:focus,
.form-select:focus,
textarea:focus {
    border-color: #d4af37;
    box-shadow: 0 0 10px rgba(212,175,55,0.5);
    background: #1e1e1e;
    color: #fff;
}

/* BUTTON */
.btn-submit {
    background: #d4af37;
    color: #000;
    border-radius: 30px;
    padding: 12px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-submit:hover {
    background: #b8942e;
    transform: translateY(-2px);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid #d4af37;
    margin-top: 3rem;
    color: #aaa;
}
</style>

</head>

<body>

<!-- NAV -->
<nav class="navbar">
<div class="container-fluid">
<a class="navbar-brand" href="index.html">Bono Foundation</a>
</div>
</nav>

<!-- FORM -->
<section class="section">
<div class="container">

<div class="row justify-content-center">
<div class="col-lg-6">

<div class="form-container">

<h2 class="form-title">Apply to Bono Foundation</h2>
<p class="form-subtitle">
Take the first step towards your future
</p>

<form action="https://formsubmit.co/shoneesani@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="thankyou.html">

<!-- NAME -->
<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
</div>

<!-- EMAIL -->
<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" name="email" class="form-control" placeholder="Enter your email" required>
</div>

<!-- PROGRAM -->
<div class="mb-3">
<label class="form-label">Program of Interest</label>
<select name="program" class="form-select" required>
<option value="">Select a program</option>
<option>Mentoring</option>
<option>Tutoring</option>
<option>Career Guidance</option>
</select>
</div>

<!-- MESSAGE -->
<div class="mb-3">
<label class="form-label">Why are you applying?</label>
<textarea name="message" rows="4" class="form-control" placeholder="Tell us about your goals..." required></textarea>
</div>

<!-- SUBMIT -->
<div class="d-grid mt-4">
<button type="submit" class="btn btn-submit">Submit Application</button>
</div>

</form>

</div>

</div>
</div>

</div>
</section>

<!-- FOOTER -->
<footer>
<p>Bono Foundation</p>
<p>&copy; 2025</p>
</footer>

</body>
</html>
