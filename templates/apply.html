    <body>
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">Bono Foundation</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="apply.html">Apply</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Services</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="mentoring.html">Mentoring</a></li>
                            <li><a class="dropdown-item" href="tutoring.html">Tutoring</a></li>
                            <li><a class="dropdown-item" href="careerguidance.html">Career Guidance</a></li>

                    </li>
                    <li class="nav-item"><a class="nav-link disabled" aria-disabled="true">Disabled</a></li>
                </ul>
            </div>
            </div>
        </nav>
        <h1>Apply to Bono Foundation</h1>
    </header>

    <main>
        <form action="https://formsubmit.co/shoneesani@gmail.com" method="POST">
        <!-- Add this to prevent spam -->
        <input type="hidden" name="_captcha" value="false">
        <!-- Redirect after submit (optional) -->
        <input type="hidden" name="_next" value="https://yourdomain.com/thankyou.html">

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="program">Program of Interest:</label><br>
        <select id="program" name="program" required>
            <option value="mentoring">Mentoring</option>
            <option value="tutoring">Tutoring</option>
            <option value="career-guidance">Career Guidance</option>
        </select><br><br>

        <label for="message">Why are you applying?</label><br>
        <textarea id="message" name="message" rows="5" required></textarea><br><br>

        <button type="submit">Submit Application</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 Bono Foundation</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
